<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Compare</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div id="toast-root" aria-live="polite" aria-atomic="false" aria-relevant="additions"></div>

  <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box" id="modal-box"></div>
  </div>

  <div class="popup-root">

    <header class="popup-header">
      <div class="header-brand">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-brand)" stroke-width="2.5" aria-hidden="true">
          <rect x="2" y="3" width="20" height="14" rx="2"/>
          <path d="M8 21h8M12 17v4"/>
        </svg>
        <span class="header-title">UI Compare</span>
      </div>
      <div id="header-url" class="header-url" title=""></div>
      <button class="btn-close" id="close-popup-btn" aria-label="Close extension" title="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </header>

    <nav class="tab-bar" role="tablist" aria-label="Main navigation">
      <button class="tab active" role="tab" aria-selected="true"
              aria-controls="panel-extract" id="tab-extract" data-tab="extract">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        Extract
      </button>
      <button class="tab" role="tab" aria-selected="false"
              aria-controls="panel-compare" id="tab-compare" data-tab="compare">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
          <path d="M8 6l4-4 4 4M16 18l-4 4-4-4M12 2v20"/>
        </svg>
        Compare
      </button>
    </nav>

    <main class="popup-content">

      <section id="panel-extract" role="tabpanel" aria-labelledby="tab-extract">

        <div class="card">
          <div class="card-header">
            <h2 class="card-title">Filters</h2>
            <span class="badge-optional">optional</span>
          </div>
          <div class="filter-grid">
            <div class="form-field">
              <label class="label" for="filter-class">Class</label>
              <input class="input" id="filter-class" type="text" placeholder="e.g. btn">
            </div>
            <div class="form-field">
              <label class="label" for="filter-id">ID</label>
              <input class="input" id="filter-id" type="text" placeholder="e.g. header">
            </div>
            <div class="form-field">
              <label class="label" for="filter-tag">Tag</label>
              <input class="input" id="filter-tag" type="text" placeholder="e.g. button">
            </div>
          </div>
        </div>

        <button class="btn-primary" id="extract-btn" aria-describedby="extract-progress">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
            <path d="M4 8V4h4M20 8V4h-4M4 16v4h4M20 16v4h-4"/>
          </svg>
          Extract Elements
        </button>

        <div id="extract-progress" class="progress-wrap hidden" role="progressbar"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
             aria-label="Extraction progress">
          <div class="progress-track">
            <div class="progress-fill" id="extract-progress-bar"></div>
          </div>
          <span class="progress-label" id="extract-progress-label">Scanning…</span>
        </div>

        <div class="card card--toolbar">
          <h2 class="section-title">Saved Reports</h2>
          <div class="section-row-actions">
            <select class="select select-sm" id="export-all-format" aria-label="Bulk export format">
              <option value="excel">Excel</option>
              <option value="csv">CSV</option>
              <option value="json">JSON</option>
            </select>
            <button class="btn-ghost btn-sm" id="export-all-btn" title="Export all reports" aria-label="Export all reports">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
              </svg>
              Export All
            </button>
            <button class="btn-destructive btn-sm" id="delete-all-btn" title="Delete all reports" aria-label="Delete all reports">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/>
              </svg>
              Delete All
            </button>
          </div>
        </div>

        <div class="search-bar-wrap">
          <svg class="search-bar__icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input class="search-bar__input" id="search-reports" type="search"
                 placeholder="Search reports…" aria-label="Search saved reports">
          <kbd class="search-bar__kbd">/</kbd>
        </div>

        <div id="reports-list" class="reports-list" role="list" aria-label="Saved reports"></div>

        <div id="reports-empty" class="empty-state hidden" aria-live="polite">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
               stroke="var(--color-text-tertiary)" stroke-width="1.5" aria-hidden="true">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <p class="empty-title">No reports yet</p>
          <p class="empty-hint">Extract elements from a page to create your first report</p>
        </div>

      </section>

      <section id="panel-compare" role="tabpanel" aria-labelledby="tab-compare" hidden>

        <div class="card">

          <div class="form-field">
            <label class="label" for="baseline-report">Baseline</label>
            <select class="select" id="baseline-report" aria-label="Select baseline report">
              <option value="">Select report…</option>
            </select>
            <label class="upload-report-label" for="baseline-upload" title="Import report from JSON, CSV, or Excel file">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              Import file
            </label>
            <input type="file" id="baseline-upload" accept=".json,.csv,.xlsx,.xls" hidden>
          </div>

          <div class="vs-divider"><span class="vs-label">VS</span></div>

          <div class="form-field">
            <label class="label" for="compare-report">Compare</label>
            <select class="select" id="compare-report" aria-label="Select compare report">
              <option value="">Select report…</option>
            </select>
            <label class="upload-report-label" for="compare-upload" title="Import report from JSON, CSV, or Excel file">
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              Import file
            </label>
            <input type="file" id="compare-upload" accept=".json,.csv,.xlsx,.xls" hidden>
          </div>

          <hr class="card-sep">

          <div class="form-field">
            <label class="label">Mode</label>
            <div class="segmented-control" role="group" aria-label="Comparison mode">
              <label class="seg-option">
                <input type="radio" name="compare-mode" value="dynamic" checked>
                <span class="seg-label">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
                  </svg>
                  Dynamic
                </span>
              </label>
              <label class="seg-option">
                <input type="radio" name="compare-mode" value="static">
                <span class="seg-label">
                  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
                  </svg>
                  Static
                </span>
              </label>
            </div>
            <p class="field-hint" id="mode-hint-dynamic">Compares key styles only — skips text and minor size differences.</p>
            <p class="field-hint" id="mode-hint-static">Compares everything — all styles, text content, and attributes.</p>
          </div>

          <label class="toggle-row" for="visual-diff-toggle" id="visual-toggle-wrap">
            <div class="toggle-row__text">
              <span class="toggle-row__label">Visual Diff</span>
              <span class="toggle-row__hint">Side-by-side screenshot diff of both open tabs</span>
            </div>
            <div class="visual-toggle__track">
              <input type="checkbox" id="visual-diff-toggle" checked>
              <span class="visual-toggle__thumb" aria-hidden="true"></span>
            </div>
          </label>

        </div>

        <button class="btn-primary" id="compare-btn" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" aria-hidden="true">
            <path d="M8 6l4-4 4 4M16 18l-4 4-4-4M12 2v20"/>
          </svg>
          Compare Reports
        </button>

        <div id="compare-progress" class="progress-wrap hidden" role="progressbar"
             aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"
             aria-label="Comparison progress">
          <div class="progress-track">
            <div class="progress-fill" id="compare-progress-bar"></div>
          </div>
          <span class="progress-label" id="compare-progress-label">Matching elements…</span>
        </div>

        <div id="compare-results"></div>

      </section>

    </main>

    <footer class="reports-footer" id="reports-footer" aria-live="polite"></footer>
  </div>

  <script src="libs/xlsx.full.min.js"></script>
  <script type="module" src="popup.js"></script>
</body>
</html>
